services:
  - type: web
    name: fitna-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_modules && python manage.py create_super_admin
    startCommand: gunicorn fitna_backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: fitna_backend.settings.production
      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        value: fitna-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://fitna-frontend.vercel.app


